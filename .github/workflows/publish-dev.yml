name: Publish Dev Packages

on:
  push:
    branches:
      - feat/quatrain-studio

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: YARN_ENABLE_IMMUTABLE_INSTALLS=false yarn install

      - name: Authenticate with registries
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${GITHUB_TOKEN}" >> ~/.npmrc

      - name: Publish all changed packages (latest-dev)
        run: yarn node bin/publish_all.js --tag latest-dev

      - name: Commit version bumps & hashes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: release dev versions & update hashes [skip ci]"
