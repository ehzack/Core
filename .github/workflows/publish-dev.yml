name: Publish Dev Packages

on:
  workflow_dispatch:
  push:
    branches:
      - feat/quatrain-studio
    paths:
      - 'packages/**'
      - 'bin/**'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/publish-dev.yml'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # NOSONAR
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4 # NOSONAR
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: YARN_ENABLE_IMMUTABLE_INSTALLS=false yarn install

      - name: Authenticate with registries
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${GITHUB_TOKEN}" >> ~/.npmrc

      - name: Audit JSDoc for regressions
        run: |
          OUTPUT=$(npx ts-node scripts/audit-jsdoc.ts | grep -E "\\[Missing\\] packages/(auth|backend|storage|studio|testing|worker)" || true)
          if [ ! -z "$OUTPUT" ]; then
            echo "JSDoc missing in audited packages:"
            echo "$OUTPUT"
            exit 1
          fi

      - name: Publish all changed packages (latest-dev)
        run: yarn node bin/publish_all.js --tag latest-dev

      - name: Sync with remote to prevent push rejection
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin ${{ github.ref_name }}
          git pull --rebase origin ${{ github.ref_name }} --autostash

      - name: Commit version bumps & hashes
        uses: stefanzweifel/git-auto-commit-action@v5 # NOSONAR
        with:
          commit_message: "chore: release dev versions & update hashes [skip ci]"
