name: Publish Studio-Image Container

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'containers/studio-image/**'
      - 'apps/studio-api/**'
      - 'apps/studio-web/**'
  workflow_run:
    workflows: ["Publish Independent Packages"]
    types:
      - completed

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/studio-image

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # NOSONAR

      - name: Get version from package.json
        id: package-version
        run: echo "VERSION=$(jq -r .version containers/studio-image/package.json)" >> $GITHUB_ENV

      - name: Prepare package.json for NPM registry (Immutable versions)
        run: |
          node -e '
            const fs = require("fs");
            const { execSync } = require("child_process");
            const targetPkgPath = "containers/studio-image/package.json";
            const targetPkg = JSON.parse(fs.readFileSync(targetPkgPath, "utf8"));
            
            for (const dep in targetPkg.dependencies) {
              if (targetPkg.dependencies[dep] === "workspace:*") {
                try {
                  const latestVersion = execSync(`npm view ${dep} version`, { encoding: "utf8" }).trim();
                  targetPkg.dependencies[dep] = latestVersion;
                  console.log(`Resolved ${dep} to published NPM version ${latestVersion}`);
                } catch (e) {
                  console.error(`Failed to fetch version for ${dep} from NPM. Falling back to *`);
                  targetPkg.dependencies[dep] = "*";
                }
              }
            }
            fs.writeFileSync(targetPkgPath, JSON.stringify(targetPkg, null, 2));
          '

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3 # NOSONAR
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5 # NOSONAR
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ env.VERSION }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5 # NOSONAR
        with:
          context: containers/studio-image
          file: containers/studio-image/ContainerFile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Sync with remote to avoid push conflicts
        run: |
          git config pull.rebase true
          git pull origin main

      - name: Bump package version
        run: |
          npm --no-git-tag-version --prefix containers/studio-image version patch

      - name: Commit version bump
        uses: stefanzweifel/git-auto-commit-action@v5 # NOSONAR
        with:
          commit_message: "chore(studio-image): bump patch version [skip ci]"
          file_pattern: "containers/studio-image/package.json"
