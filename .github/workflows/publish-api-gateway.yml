name: Publish API Gateway Container Image

on:
  push:
    branches:
      - main
    paths:
      - 'containers/api-gateway/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/api-gateway

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: package-version
        run: echo "VERSION=$(jq -r .version containers/api-gateway/package.json)" >> $GITHUB_ENV

      - name: Prepare package.json for NPM registry (Immutable versions)
        run: |
          node -e '
            const fs = require("fs");
            const { execSync } = require("child_process");
            const targetPkgPath = "containers/api-gateway/package.json";
            const targetPkg = JSON.parse(fs.readFileSync(targetPkgPath, "utf8"));
            
            for (const dep in targetPkg.dependencies) {
              if (targetPkg.dependencies[dep] === "workspace:*") {
                try {
                  const latestVersion = execSync(`npm view ${dep} version`, { encoding: "utf8" }).trim();
                  targetPkg.dependencies[dep] = latestVersion;
                  console.log(`Resolved ${dep} to published NPM version ${latestVersion}`);
                } catch (e) {
                  console.error(`Failed to fetch version for ${dep} from NPM. Falling back to *`);
                  targetPkg.dependencies[dep] = "*";
                }
              }
            }
            fs.writeFileSync(targetPkgPath, JSON.stringify(targetPkg, null, 2));
          '

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ env.VERSION }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: containers/api-gateway
          file: containers/api-gateway/ContainerFile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
